<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doc.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
    


<div class="container1">

    <!--aside section start-->
        <aside>

            <div class="top">

                <div class="logo">
                    <img src="{{ url_for('static', filename='images/logo.png') }}">
                </div>
                <div class="close" id ="close-btn">
                    <span class="material-symbols-outlined"> close </span>
                </div>
            </div>
            <!--end top-->

            <div class="sidebar">

                <a href="{{ url_for('dashboard') }}" class="active">
                    <span class="material-symbols-outlined">grid_view</span>
                    <h3>Dashboard</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">work</span>
                    <h3>Job</h3>
                </a>                
                <a href="#">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <h3>Document</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <h3>Setting</h3>
                </a>
                <a href="{{ url_for('logout') }}">
                    <span class="material-symbols-outlined">logout</span>
                    <h3>Logout</h3>
                </a>
            </div>



        </aside>
    <!--aside section end-->


    <!--main section start-->
        <main>
            <h1>Dashboard</h1>
             <div class="date">
                <input type="date" id="today-date">
             </div>

             <script>
                // Get today's date in YYYY-MM-DD format
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months are 0-indexed
                const yyyy = today.getFullYear();
                const formattedDate = `${yyyy}-${mm}-${dd}`;

                // Set the value of the date input
                document.getElementById('today-date').value = formattedDate;
            </script>

            <div class="secrefy">
                <h2>Secrefy</h2>

                <div class="secretbox">
                    <form id="secretForm" method="POST" enctype="multipart/form-data">
                        <!--file upload-->
                        <input type="file" id="upload" name="file" required hidden>
                        <label for="upload" class="uploadlabel">
                            <span><i class="fa fa-cloud-upload"></i></span>
                            <p id="fileLabelText">Click to Upload</p>
                        </label>

                        <!--input n buttons-->
                        <div class="secretkey">
                            <input type="text" name="key" id="input-box" placeholder="Type Secrefy Key..." required>
                            <button type="submit" formaction="/encrypt">Encrypt</button>
                            <button type="submit" formaction="/decrypt">Decrypt</button>
                        </div>
                    </form>
                </div>
            </div>

        </main>
    <!--end main section-->
    
        <!--right section start-->
        <div class="right">
            <div class="top">
                <button id="menu-bar">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="theme-toggler">
                    <span class="material-symbols-outlined active">light_mode</span>
                    <span class="material-symbols-outlined">dark_mode</span>
                </div>
                <div class="profile">
                    <div class="info">
                        <p><b>{{ username }}</b></p>
                        <p>{{role}}</p>
                        <small class="text-muted"></small>
                    </div>
                    <div class="profile-photo">
                        <img src="{{ url_for('static', filename='images/me.jpg') }}">
                    </div>
                </div>
            </div>
            <!--end top-->

            <!--start to do list-->
            <div class="to-do">
                <h2>To-Do List</h2>
                <!--todo list section start-->
                <div class="todo-list">
                    
                    <div class="row">
                        <input type="text" id="input-box" placeholder="Add task...">
                        <button onclick="addTask()">Add</button>
                    </div>
                    <ul id="list">
            <!-- tasks will show -->
                    </ul>
                </div>
            </div>
            <!--end to do list-->
        </div>
        <!--end right section-->
</div>



<script src="{{ url_for('static', filename='js/doc.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.35.5/apexcharts.min.js"></script>
</body>
</html>
