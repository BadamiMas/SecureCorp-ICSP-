<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/doc.css') }}">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>
    


<div class="container1">

    <!--aside section start-->
        <aside>

            <div class="top">

                <div class="logo">
                    <img src="{{ url_for('static', filename='images/logo.png') }}">
                </div>
                <div class="close" id ="close-btn">
                    <span class="material-symbols-outlined"> close </span>
                </div>
            </div>
            <!--end top-->

            <div class="sidebar">

                <a href="{{ url_for('dashboard') }}" class="active">
                    <span class="material-symbols-outlined">grid_view</span>
                    <h3>Dashboard</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">work</span>
                    <h3>Job</h3>
                </a>                
                <a href="#">
                    <span class="material-symbols-outlined">receipt_long</span>
                    <h3>Document</h3>
                </a>
                <a href="#">
                    <span class="material-symbols-outlined">settings</span>
                    <h3>Setting</h3>
                </a>
                <a href="{{ url_for('logout') }}">
                    <span class="material-symbols-outlined">logout</span>
                    <h3>Logout</h3>
                </a>
            </div>



        </aside>
    <!--aside section end-->


    <!--main section start-->
        <main>
            <h1>Dashboard</h1>
             <div class="date">
                <input type="date" id="today-date">
             </div>

             <script>
                // Get today's date in YYYY-MM-DD format
                const today = new Date();
                const dd = String(today.getDate()).padStart(2, '0');
                const mm = String(today.getMonth() + 1).padStart(2, '0'); // Months are 0-indexed
                const yyyy = today.getFullYear();
                const formattedDate = `${yyyy}-${mm}-${dd}`;

                // Set the value of the date input
                document.getElementById('today-date').value = formattedDate;
            </script>

            <div class="secrefy">
                <form method="POST" enctype="multipart/form-data">
                    <label>File to Encrypt:</label>
                    <input type="file" name="file" required><br>
                    <label>Secret Key:</label>
                    <input type="text" name="key" required><br>
                    <button type="submit">Encrypt</button>
                </form>

                <form method="POST" enctype="multipart/form-data">
                    <label>File to Decrypt (.sfy):</label>
                    <input type="file" name="file" required><br>
                    <label>Secret Key:</label>
                    <input type="text" name="key" required><br>
                    <button type="submit">Decrypt</button>
                </form>
            </div>

        </main>
    <!--end main section-->
    
        <!--right section start-->
        <div class="right">
            <div class="top">
                <button id="menu-bar">
                    <span class="material-symbols-outlined">menu</span>
                </button>
                <div class="theme-toggler">
                    <span class="material-symbols-outlined active">light_mode</span>
                    <span class="material-symbols-outlined">dark_mode</span>
                </div>
                <div class="profile">
                    <div class="info">
                        <p><b>{{ username }}</b></p>
                        <p>{{role}}</p>
                        <small class="text-muted"></small>
                    </div>
                    <div class="profile-photo">
                        <img src="{{ url_for('static', filename='images/me.jpg') }}">
                    </div>
                </div>
            </div>
            <!--end top-->

        </div>
        <!--end right section-->
</div>



<script src="{{ url_for('static', filename='js/doc.js') }}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/apexcharts/3.35.5/apexcharts.min.js"></script>
</body>
</html>
